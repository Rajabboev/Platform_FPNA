name: Deploy Azure VM

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build_and_push:
    name: Build and Push Docker Hub Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./fpna-platform/backend
          file: ./fpna-platform/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fpna-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fpna-api:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./fpna-platform/frontend
          file: ./fpna-platform/frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fpna-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fpna-web:${{ github.sha }}

  deploy:
    name: Deploy to Azure VM via SSH
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: ${{ secrets.AZURE_VM_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            export APP_DIR="${{ secrets.AZURE_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="$HOME/fpna-platform"; fi
            export DOCKERHUB_NAMESPACE="${{ secrets.DOCKERHUB_USERNAME }}"
            export IMAGE_TAG="latest"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "App dir not found or not a git repo: $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"
            git fetch origin
            git checkout main
            git reset --hard origin/main

            if [ -d "$APP_DIR/fpna-platform" ]; then
              cd "$APP_DIR/fpna-platform"
            fi

            if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
              echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            fi

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml ps
